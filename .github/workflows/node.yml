name: Node SDK

on:
  pull_request:
    paths:
      - "node/**"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: node

      - name: Build
        run: npm run build
        working-directory: node

      - name: Test
        run: npm test
        working-directory: node
