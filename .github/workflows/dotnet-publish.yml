name: .NET SDK – Publish

on:
  push:
    tags:
      - "dotnet/v*"

jobs:
  publish:
    permissions:
      id-token: write # Required for publishing to Nuget using Trusted Publishers.

    name: Pack & Push to NuGet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#dotnet/v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore MissionControl.Client.slnx

      - name: Build
        run: dotnet build MissionControl.Client.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/MissionControl.Client.UnitTests/MissionControl.Client.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Pack
        run: >
          dotnet pack
          src/MissionControl.Client/MissionControl.Client.csproj
          --no-build
          --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./artifacts

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # Must be a username of a user

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{steps.login.outputs.NUGET_API_KEY}}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
